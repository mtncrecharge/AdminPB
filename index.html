<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PB Dashboard</title>
<style>
:root{
  --bg:#060d07;--surface:#0d1a0f;--surface2:#111e13;--border:rgba(0,230,118,0.12);
  --primary:#00e676;--text:#e8f5e9;--muted:rgba(232,245,233,0.45);
  --red:#ef4444;--green:#22c55e;--yellow:#f59e0b;--blue:#3b82f6;--orange:#f97316;
  --font:'Segoe UI',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;overflow-x:hidden}
/* Header */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;position:sticky;top:0;z-index:100}
.hrow{display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:6px;font-size:16px;font-weight:800}
.logo span{color:var(--primary)}
.logo svg{color:var(--primary)}
.htitle{font-size:12px;font-weight:700;color:var(--text)}
.hsub{font-size:9px;color:var(--muted)}
.hright{display:flex;align-items:center;gap:8px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--primary)}
.htime{font-size:10px;font-weight:700;font-variant-numeric:tabular-nums}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--primary);color:#000;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer}
.btnr{background:rgba(0,230,118,0.1);border:1px solid var(--border);color:var(--primary);padding:5px 8px;border-radius:8px;font-size:13px;cursor:pointer}
/* Tabs */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:57px;z-index:99}
.tab{flex:1;padding:9px 4px;text-align:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
/* Summary cards */
.sum-grid{display:flex;flex-wrap:wrap;gap:6px;padding:10px 12px 6px}
.sc{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 10px;min-width:60px;flex:1}
.sc-l{font-size:9px;color:var(--muted);text-transform:uppercase;font-weight:700;letter-spacing:.5px}
.sc-v{font-size:18px;font-weight:800;margin-top:2px}
/* Search & filter */
.sfwrap{padding:8px 12px 4px}
.sinput{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 12px 9px 34px;color:var(--text);font-size:13px;outline:none}
.sinput::placeholder{color:var(--muted)}
.sicon{position:absolute;left:22px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
.srel{position:relative}
.frow{display:flex;gap:6px;padding:6px 12px}
select{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 8px;font-size:12px;outline:none;-webkit-appearance:none}
.cnt{font-size:11px;color:var(--muted);padding:2px 12px 6px;font-weight:600}
/* Table */
.twrap{overflow-x:auto;padding:0 12px 12px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:8px 6px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
td{padding:8px 6px;border-bottom:1px solid rgba(0,230,118,0.06);vertical-align:top}
tr.mrow{cursor:pointer}
tr.mrow:hover td{background:rgba(0,230,118,0.04)}
tr.arow td{background:rgba(0,230,118,0.06)}
tr.det-row td{padding:0}
.det-inner{padding:10px 8px;background:var(--surface2);border-radius:8px;margin:4px 0}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.det-item .lbl{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase}
.det-item .val{font-size:12px;font-weight:600;margin-top:2px}
.dbtns{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.dbtn{flex:1;min-width:70px;padding:7px 6px;border-radius:8px;border:none;font-size:11px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:4px}
.dbtn-ops{background:rgba(0,230,118,0.12);color:var(--primary);border:1px solid rgba(0,230,118,0.25)}
/* Badge */
.badge{display:inline-block;padding:3px 7px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.b-online{background:rgba(34,197,94,0.15);color:#22c55e;border:1px solid rgba(34,197,94,0.3)}
.b-offline{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3)}
.b-high{background:rgba(249,115,22,0.15);color:#f97316;border:1px solid rgba(249,115,22,0.3)}
.b-low{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3)}
.b-ok{background:rgba(34,197,94,0.15);color:#22c55e;border:1px solid rgba(34,197,94,0.3)}
.b-type{background:rgba(59,130,246,0.15);color:#3b82f6;border:1px solid rgba(59,130,246,0.3)}
/* Terminal ID */
.tid{color:var(--primary);font-size:11px;font-weight:700}
.tname{font-size:11px;color:var(--text);line-height:1.3;margin-top:2px}
.tarea{font-size:10px;color:var(--muted);margin-top:1px}
/* PB% bar */
.pbbar{width:100%;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;margin-top:4px}
.pbfill{height:100%;border-radius:2px;transition:width 0.3s}
/* Map */
.map-wrap{padding:0 12px 12px}
#map{width:100%;height:340px;border-radius:12px;border:1px solid var(--border);background:var(--surface2)}
.map-legend{display:flex;gap:12px;padding:6px 0 0;font-size:10px;color:var(--muted);flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:4px}
.leg-dot{width:8px;height:8px;border-radius:50%}
/* Loading */
.loading{text-align:center;padding:20px;color:var(--muted);font-size:12px}
/* Popup */
.pu-id{font-size:11px;font-weight:800;color:#00e676;margin-bottom:4px}
.pu-name{font-size:12px;font-weight:600;margin-bottom:6px;color:#fff}
.pu-row{font-size:11px;color:#aaa;margin-bottom:2px;display:flex;justify-content:space-between;gap:8px}
.pu-row span{color:#fff;font-weight:600}
.pu-btns{margin-top:8px}
.pu-btn{display:inline-block;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;text-decoration:none;margin-right:4px}
.leaflet-popup-content-wrapper{background:#0d1a0f;border:1px solid rgba(0,230,118,0.2);border-radius:10px;color:#fff}
.leaflet-popup-tip{background:#0d1a0f}
/* Login */
#loginScreen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 24px;width:100%;max-width:340px}
.login-logo{text-align:center;margin-bottom:20px}
.login-logo .lname{font-size:22px;font-weight:900;margin-top:8px}
.login-logo .lname span{color:var(--primary)}
.login-title{font-size:14px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:11px;color:var(--muted);margin-bottom:18px}
.linput{width:100%;background:rgba(0,230,118,0.06);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:14px;margin-bottom:12px;outline:none}
.linput:focus{border-color:var(--primary)}
.lbtn{width:100%;background:var(--primary);color:#000;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;margin-top:4px}
.lerr{color:#ef4444;font-size:11px;margin-top:8px;text-align:center;min-height:16px}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="#00e676"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg>
      <div class="lname">Re<span>Charge</span></div>
    </div>
    <div class="login-title">PB Dashboard</div>
    <div class="login-sub">Masuk dengan akun kamu</div>
    <input id="loginName" class="linput" placeholder="Nama..." autocomplete="off">
    <input id="loginPass" class="linput" type="password" placeholder="Password..." onkeydown="if(event.key==='Enter')doLogin()">
    <button class="lbtn" onclick="doLogin()">Masuk →</button>
    <div id="loginErr" class="lerr"></div>
  </div>
</div>

<div class="header">
  <div class="hrow">
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg>
      Re<span>Charge</span>
    </div>
    <div style="text-align:center">
      <div class="htitle">PB Dashboard</div>
      <div class="hsub">Auto refresh 30 detik</div>
    </div>
    <div class="hright">
      <div class="dot"></div>
      <div class="htime" id="htime">--:--:--</div>
      <div class="avatar" id="userAvatar" onclick="doLogout()">?</div>
      <button class="btnr" onclick="mapInitialFit=false;loadAllData(true)">⟳</button>
    </div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" id="tab-replenish" onclick="switchTab('replenish')">🔋 Replenish</div>
  <div class="tab" id="tab-pickup" onclick="switchTab('pickup')">📦 Pickup</div>
  <div class="tab" id="tab-pblock" onclick="switchTab('pblock')">🔒 PB Lock</div>
</div>

<!-- Summary -->
<div class="sum-grid" id="summary"></div>

<!-- Search & Filter -->
<div class="sfwrap">
  <div class="srel">
    <span class="sicon">🔍</span>
    <input id="srch" class="sinput" placeholder="Cari terminal / area..." oninput="applyFilter()">
  </div>
</div>
<div class="frow">
  <select id="fConn" onchange="applyFilter()">
    <option value="">Semua Koneksi</option>
    <option value="true">Online</option>
    <option value="false">Offline</option>
  </select>
  <select id="fType" onchange="applyFilter()">
    <option value="">Semua Tipe</option>
  </select>
</div>
<div class="frow">
  <select id="fArea" onchange="applyFilter()">
    <option value="">Semua Area</option>
  </select>
</div>
<div class="cnt" id="cnt">0 terminal</div>

<!-- Table -->
<div class="twrap" id="twrap">
  <div class="loading" id="loading">Memuat data...</div>
  <table id="tbl" style="display:none">
    <thead>
      <tr>
        <th>Terminal</th>
        <th>PB%</th>
        <th>Info</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- end -->

<script>
// ── Users ──
const USERS = {
  'Admin':         { pass:'pass307', role:'admin' },
  'Dhany H':       { pass:'pass321', role:'admin' },
  'Gamma Epshylon':{ pass:'pass532', role:'tech', techName:'Gamma Epshylon' },
  'Shabri Yasin':  { pass:'pass231', role:'tech', techName:'Shabri Yasin' },
  'Rusli':         { pass:'pass743', role:'tech', techName:'Rusli' },
  'Ilham':         { pass:'pass975', role:'tech', techName:'Ilham' },
  'Fahmi':         { pass:'pass876', role:'tech', techName:'Fahmi' },
  'Marjuki':       { pass:'pass427', role:'tech', techName:'Marjuki' },
  'Bram':          { pass:'pass964', role:'tech', techName:'Bram' },
  'Arya':          { pass:'pass888', role:'tech', techName:'Arya' },
  'Noval':         { pass:'pass189', role:'tech', techName:'Noval' },
  'Mufid':         { pass:'pass951', role:'tech', techName:'Mufid' },
  'Kaspi':         { pass:'pass691', role:'tech', techName:'Kaspi' },
};

// ── Google Sheets CSV URLs ──
const CSV_URLS = {
  replenish: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTMWv2mD7Ji9EY5gAuC0tRquUY7qQGBT-rI4IpsU6JfrM-7XrLOom3Q4GTpt1dWYbEYEH146BWpPfxD/pub?gid=1068833881&single=true&output=csv',
  pickup:    'https://docs.google.com/spreadsheets/d/e/2PACX-1vTMWv2mD7Ji9EY5gAuC0tRquUY7qQGBT-rI4IpsU6JfrM-7XrLOom3Q4GTpt1dWYbEYEH146BWpPfxD/pub?gid=2147311730&single=true&output=csv',
  pblock:    'https://docs.google.com/spreadsheets/d/e/2PACX-1vTMWv2mD7Ji9EY5gAuC0tRquUY7qQGBT-rI4IpsU6JfrM-7XrLOom3Q4GTpt1dWYbEYEH146BWpPfxD/pub?gid=1421174182&single=true&output=csv',
};

let CURRENT_USER = null;
let DATA = { replenish:[], pickup:[], pblock:[] };
let FILTERED = [];
let ACTIVE_TAB = 'replenish';
let openDetail = null;

// ── Clock ──
setInterval(()=>{
  const n=new Date();
  document.getElementById('htime').textContent=
    String(n.getHours()).padStart(2,'0')+'.'+
    String(n.getMinutes()).padStart(2,'0')+'.'+
    String(n.getSeconds()).padStart(2,'0');
},1000);

// ── Login ──
function doLogin(){
  const name = document.getElementById('loginName').value.trim();
  const pass = document.getElementById('loginPass').value;
  const user = USERS[name];
  if(!user||user.pass!==pass){
    document.getElementById('loginErr').textContent='❌ Nama atau password salah';
    document.getElementById('loginPass').value='';
    return;
  }
  CURRENT_USER = {name,...user};
  localStorage.setItem('pb_session', JSON.stringify({name,pass}));
  applyLogin();
}

function applyLogin(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('userAvatar').textContent=CURRENT_USER.name.charAt(0).toUpperCase();
  loadAllData(true);
}

function doLogout(){
  if(!confirm('Logout dari akun '+CURRENT_USER.name+'?')) return;
  localStorage.removeItem('pb_session');
  CURRENT_USER=null;
  location.reload();
}

// ── CSV Parser ──
function parseCSV(txt){
  const rows=[];let cur='',inq=false,row=[];
  for(let i=0;i<txt.length;i++){
    const c=txt[i];
    if(c==='"'){inq=!inq;}
    else if(c===','&&!inq){row.push(cur);cur='';}
    else if((c==='\n'||c==='\r')&&!inq){
      if(cur||row.length){row.push(cur);rows.push(row);}
      cur='';row=[];if(c==='\r'&&txt[i+1]==='\n')i++;
    } else cur+=c;
  }
  if(cur||row.length){row.push(cur);rows.push(row);}
  return rows;
}

// ── Parse each tab ──
function parseReplenish(rows){
  return rows.slice(1).filter(r=>r[0]&&r[0].trim()).map(r=>{
    const g=i=>r[i]!=null?String(r[i]).trim():'';
    return{
      id:g(0),name:g(1),type:g(2),conn:g(3).toLowerCase()==='true',
      slots:parseInt(g(4))||0,pbPct:g(5),area:g(6),
      lat:parseFloat(g(7))||null,lng:parseFloat(g(8))||null,
      charging:parseInt(g(9))||0,ready:parseInt(g(10))||0,
      empty:parseInt(g(11))||0,lock:parseInt(g(12))||0,
      replenish:parseInt(g(13))||0,ops:g(14)
    };
  }).filter(r=>r.id);
}

function parsePickup(rows){
  return rows.slice(1).filter(r=>r[0]&&r[0].trim()).map(r=>{
    const g=i=>(r[i]!=null?String(r[i]).replace(/[\r\n\t]/g,'').trim():'');
    return{
      id:g(0),name:g(1),type:g(2),conn:g(3).toLowerCase()==='true',
      slots:parseInt(g(4))||0,pbPct:g(5),area:g(6),
      lat:parseFloat(g(7))||null,lng:parseFloat(g(8))||null,
      empty:parseInt(g(9))||0,lock:parseInt(g(10))||0,
      currentPb:parseInt(g(11))||0,ideal:parseInt(g(12))||0,
      pickup:parseInt(g(13))||0,ops:g(14)
    };
  }).filter(r=>r.id);
}

function parsePBLock(rows){
  return rows.slice(1).filter(r=>r[0]&&r[0].trim()).map(r=>{
    const g=i=>(r[i]!=null?String(r[i]).replace(/[\r\n\t]/g,'').trim():'');
    return{
      id:g(0),name:g(1),type:g(2),conn:g(3).toLowerCase()==='true',
      slots:parseInt(g(4))||0,pbPct:g(5),area:g(6),
      lat:parseFloat(g(7))||null,lng:parseFloat(g(8))||null,
      charging:parseInt(g(9))||0,empty:parseInt(g(10))||0,
      lock:parseInt(g(11))||0,ops:g(12)
    };
  }).filter(r=>r.id);
}

function parseReplenish(rows){
  return rows.slice(1).filter(r=>r[0]&&r[0].trim()).map(r=>{
    const g=i=>(r[i]!=null?String(r[i]).replace(/[\r\n\t]/g,'').trim():'');
    return{
      id:g(0),name:g(1),type:g(2),conn:g(3).toLowerCase()==='true',
      slots:parseInt(g(4))||0,pbPct:g(5),area:g(6),
      lat:parseFloat(g(7))||null,lng:parseFloat(g(8))||null,
      charging:parseInt(g(9))||0,ready:parseInt(g(10))||0,
      empty:parseInt(g(11))||0,lock:parseInt(g(12))||0,
      replenish:parseInt(g(13))||0,ops:g(14)
    };
  }).filter(r=>r.id);
}

// ── Load all data ──
async function loadAllData(force=false){
  document.getElementById('htime').style.color='var(--yellow)';
  try{
    const url = CSV_URLS[ACTIVE_TAB];
    const t = await fetch(url+'&t='+Date.now()).then(r=>r.text());
    const parsed = parseCSV(t);
    let newData;
    if(ACTIVE_TAB==='replenish') newData=parseReplenish(parsed);
    else if(ACTIVE_TAB==='pickup') newData=parsePickup(parsed);
    else newData=parsePBLock(parsed);

    // Guard
    if(!force && DATA[ACTIVE_TAB].length>0 && newData.length < DATA[ACTIVE_TAB].length*0.5){
      document.getElementById('htime').style.color='var(--text)';
      return;
    }
    DATA[ACTIVE_TAB] = newData;
    fillAreaFilter();
    fillTypeFilter();
    applyFilter();
  }catch(e){ console.error(e); }
  document.getElementById('htime').style.color='var(--text)';
}

// ── Switch tab ──
function switchTab(tab){
  ACTIVE_TAB = tab;
  ['replenish','pickup','pblock'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  openDetail = null;
  mapInitialFit = false;
  fillAreaFilter();
  fillTypeFilter();
  if(DATA[tab].length===0) loadAllData(true);
  else applyFilter();
}

// ── Fill area filter ──
function fillAreaFilter(){
  const data=DATA[ACTIVE_TAB];
  const areas=[...new Set(data.map(r=>r.area).filter(Boolean))].sort();
  const sel=document.getElementById('fArea');
  const cur=sel.value;
  sel.innerHTML='<option value="">Semua Area</option>'+areas.map(a=>`<option value="${a}">${a}</option>`).join('');
  sel.value=cur;
}

// ── Fill type filter ──
function fillTypeFilter(){
  const data=DATA[ACTIVE_TAB];
  const types=[...new Set(data.map(r=>r.type).filter(Boolean))].sort();
  const sel=document.getElementById('fType');
  const cur=sel.value;
  sel.innerHTML='<option value="">Semua Tipe</option>'+types.map(t=>`<option value="${t}">${t}</option>`).join('');
  sel.value=cur;
}

// ── PB color ──
function pbColor(pct){
  const n=parseFloat(pct)||0;
  if(n<=25) return 'var(--red)';
  if(n<=50) return 'var(--yellow)';
  return 'var(--green)';
}

function pbBadge(pct){
  const n=parseFloat(pct)||0;
  if(n<=25) return `<span class="badge b-low">${pct}</span>`;
  if(n<=50) return `<span class="badge b-high">${pct}</span>`;
  return `<span class="badge b-ok">${pct}</span>`;
}

// ── Apply filter ──
function applyFilter(){
  const s=document.getElementById('srch').value.toLowerCase();
  const conn=document.getElementById('fConn').value;
  const area=document.getElementById('fArea').value;
  const type=document.getElementById('fType').value;
  const data=DATA[ACTIVE_TAB];

  FILTERED=data.filter(r=>{
    const ms=!s||r.name.toLowerCase().includes(s)||r.id.toLowerCase().includes(s)||r.area.toLowerCase().includes(s);
    const mc=conn===''||(conn==='true'&&r.conn)||(conn==='false'&&!r.conn);
    const ma=!area||r.area===area;
    const mt=!type||r.type===type;
    return ms&&mc&&ma&&mt;
  });

  // Summary
  const total=FILTERED.length;
  const online=FILTERED.filter(r=>r.conn).length;
  const offline=FILTERED.filter(r=>!r.conn).length;

  let extraCards=[];
  if(ACTIVE_TAB==='replenish'){
    const totalRpl=FILTERED.reduce((s,r)=>s+r.replenish,0);
    const totalLock=FILTERED.reduce((s,r)=>s+r.lock,0);
    extraCards=[
      {l:'Total Rpl',v:totalRpl,c:'var(--orange)'},
      {l:'PB Lock',v:totalLock,c:'var(--red)'},
    ];
  } else if(ACTIVE_TAB==='pickup'){
    const totalPick=FILTERED.reduce((s,r)=>s+r.pickup,0);
    const totalLock=FILTERED.reduce((s,r)=>s+r.lock,0);
    extraCards=[
      {l:'Total Pickup',v:totalPick,c:'var(--orange)'},
      {l:'PB Lock',v:totalLock,c:'var(--red)'},
    ];
  } else {
    const totalLock=FILTERED.reduce((s,r)=>s+r.lock,0);
    extraCards=[
      {l:'Total Lock',v:totalLock,c:'var(--red)'},
    ];
  }

  document.getElementById('summary').innerHTML=[
    {l:'Total',v:total,c:'var(--primary)'},
    {l:'Online',v:online,c:'var(--green)'},
    {l:'Offline',v:offline,c:'var(--red)'},
    ...extraCards
  ].map(x=>`<div class="sc"><div class="sc-l">${x.l}</div><div class="sc-v" style="color:${x.c}">${x.v}</div></div>`).join('');

  document.getElementById('cnt').textContent=FILTERED.length+' terminal';
  renderTable();
  document.getElementById('loading').style.display='none';
  document.getElementById('tbl').style.display=FILTERED.length?'table':'none';
}

// ── Render table ──
function renderTable(){
  const tbody=document.getElementById('tbody');
  openDetail=null;
  if(!FILTERED.length){ tbody.innerHTML=''; return; }

  tbody.innerHTML=FILTERED.map((r,i)=>{
    const connBadge=r.conn
      ?'<span class="badge b-online">● Online</span>'
      :'<span class="badge b-offline">● Offline</span>';
    const pbPct=r.pbPct||'0%';
    const pbN=parseFloat(pbPct)||0;
    const pbFill=`background:${pbColor(pbPct)};width:${Math.min(pbN,100)}%`;

    let infoCell='';
    if(ACTIVE_TAB==='replenish'){
      infoCell=`<span style="color:var(--orange);font-weight:700">+${r.replenish} Rpl</span>`;
      if(r.lock>0) infoCell+=`<br><span style="color:var(--red);font-size:10px">🔒 ${r.lock}</span>`;
    } else if(ACTIVE_TAB==='pickup'){
      infoCell=`<span style="color:var(--blue);font-weight:700">-${r.pickup} PU</span>`;
      if(r.lock>0) infoCell+=`<br><span style="color:var(--red);font-size:10px">🔒 ${r.lock}</span>`;
    } else {
      infoCell=`<span style="color:var(--red);font-weight:700">🔒 ${r.lock}</span>`;
    }

    const detRow=`<tr id="det-${i}" class="det-row" style="display:none"><td colspan="3">
      <div class="det-inner">
        <div class="det-grid">
          <div class="det-item"><div class="lbl">Terminal ID</div><div class="val" style="font-size:10px;color:var(--primary)">${r.id}</div></div>
          <div class="det-item"><div class="lbl">Tipe</div><div class="val"><span class="badge b-type">${r.type}</span></div></div>
          <div class="det-item"><div class="lbl">Slots</div><div class="val">${r.slots}</div></div>
          <div class="det-item"><div class="lbl">Koneksi</div><div class="val">${connBadge}</div></div>
          <div class="det-item"><div class="lbl">PB%</div><div class="val">${pbBadge(pbPct)}</div></div>
          <div class="det-item"><div class="lbl">Area</div><div class="val" style="font-size:11px">${r.area||'-'}</div></div>
          ${ACTIVE_TAB==='replenish'?`
          <div class="det-item"><div class="lbl">Charging</div><div class="val">${r.charging}</div></div>
          <div class="det-item"><div class="lbl">Ready Rent</div><div class="val">${r.ready}</div></div>
          <div class="det-item"><div class="lbl">Empty Slot</div><div class="val">${r.empty}</div></div>
          <div class="det-item"><div class="lbl">PB Lock</div><div class="val" style="color:var(--red)">${r.lock}</div></div>
          <div class="det-item"><div class="lbl">Replenish</div><div class="val" style="color:var(--orange);font-weight:800">${r.replenish}</div></div>
          `:''}
          ${ACTIVE_TAB==='pickup'?`
          <div class="det-item"><div class="lbl">Current PB</div><div class="val">${r.currentPb}</div></div>
          <div class="det-item"><div class="lbl">Ideal 50%</div><div class="val">${r.ideal}</div></div>
          <div class="det-item"><div class="lbl">Empty Slot</div><div class="val">${r.empty}</div></div>
          <div class="det-item"><div class="lbl">PB Lock</div><div class="val" style="color:var(--red)">${r.lock}</div></div>
          <div class="det-item"><div class="lbl">Pickup</div><div class="val" style="color:var(--blue);font-weight:800">${r.pickup}</div></div>
          `:''}
          ${ACTIVE_TAB==='pblock'?`
          <div class="det-item"><div class="lbl">Charging</div><div class="val">${r.charging}</div></div>
          <div class="det-item"><div class="lbl">Empty Slot</div><div class="val">${r.empty}</div></div>
          <div class="det-item"><div class="lbl">PB Lock</div><div class="val" style="color:var(--red);font-weight:800">${r.lock}</div></div>
          `:''}
        </div>
        <div class="dbtns">
          ${r.ops?`<button onclick="window.open(this.dataset.url,'_blank')" data-url="${(r.ops||'').replace(/"/g,'&quot;')}" class="dbtn dbtn-ops">⚡ Ops</button>`:''}
        </div>
      </div>
    </td></tr>`;

    return `<tr id="row-${i}" class="mrow" onclick="toggle(${i})">
      <td>
        <div class="tid">${r.id}</div>
        <div class="tname">${r.name}</div>
        <div class="pbbar"><div class="pbfill" style="${pbFill}"></div></div>
      </td>
      <td>${pbBadge(pbPct)}</td>
      <td>${infoCell}</td>
    </tr>${detRow}`;
  }).join('');
}

function toggle(i){
  const det=document.getElementById('det-'+i);
  const row=document.getElementById('row-'+i);
  if(openDetail!==null&&openDetail!==i){
    document.getElementById('det-'+openDetail).style.display='none';
    document.getElementById('row-'+openDetail).classList.remove('arow');
  }
  if(det.style.display==='none'){det.style.display='table-row';row.classList.add('arow');openDetail=i;}
  else{det.style.display='none';row.classList.remove('arow');openDetail=null;}
}

// ── Auto refresh ──
setInterval(()=>{ if(CURRENT_USER) loadAllData(); }, 30000);

// ── Restore session ──
(function restoreSession(){
  try{
    const saved=localStorage.getItem('pb_session');
    if(!saved) return;
    const {name,pass}=JSON.parse(saved);
    const user=USERS[name];
    if(!user||user.pass!==pass){ localStorage.removeItem('pb_session'); return; }
    CURRENT_USER={name,...user};
    applyLogin();
  }catch(e){ localStorage.removeItem('pb_session'); }
})();
</script>
